<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الفواتير العربي Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: #0a0a14; color: #fff; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #1a0a2e, #0f0f1a); padding: 30px 20px; text-align: center; border-bottom: 2px solid #a855f7; }
.header h1 { font-size: 2rem; color: #a855f7; margin-bottom: 5px; }
.header p { color: #888; font-size: 14px; }
.badge { display: inline-block; background: #a855f7; color: #fff; padding: 3px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }

.container { max-width: 850px; margin: auto; padding: 20px; }

/* Tabs */
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #888; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; transition: all 0.3s; }
.tab.active { background: #a855f7; color: #fff; border-color: #a855f7; }

/* Cards */
.card { background: #1a1a2e; border-radius: 12px; padding: 25px; margin-bottom: 15px; border: 1px solid #2a2a3e; transition: border 0.3s; }
.card:hover { border-color: #a855f7; }
.card-title { color: #a855f7; font-size: 16px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

/* Form */
label { display: block; margin-bottom: 5px; color: #aaa; font-size: 13px; }
input, textarea, select { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid #2a2a3e; background: #0f0f1a; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; margin-bottom: 14px; transition: border 0.3s; }
input:focus, textarea:focus, select:focus { outline: none; border-color: #a855f7; }
.row { display: flex; gap: 12px; }
.row > div { flex: 1; }

/* Color Picker */
.color-options { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
.color-opt { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.3s; }
.color-opt.selected { border-color: #fff; transform: scale(1.2); }

/* Logo Upload */
.logo-upload { border: 2px dashed #2a2a3e; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 15px; transition: border 0.3s; }
.logo-upload:hover { border-color: #a855f7; }
.logo-upload input { display: none; }
#logo-preview { max-width: 120px; max-height: 60px; margin-top: 10px; display: none; }

/* Items */
.item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; background: #0f0f1a; padding: 10px; border-radius: 8px; }
.item-row input { margin-bottom: 0; }
.btn-remove { background: #ff4444; color: #fff; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 16px; flex-shrink: 0; }

/* Buttons */
.btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700; transition: all 0.3s; }
.btn-add { background: transparent; color: #a855f7; border: 1px dashed #a855f7; width: 100%; margin-top: 5px; }
.btn-add:hover { background: #a855f720; }
.btn-generate { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; width: 100%; padding: 16px; font-size: 16px; border-radius: 10px; box-shadow: 0 4px 20px #a855f740; }
.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 25px #a855f760; }

/* Summary */
.summary-box { background: #0f0f1a; border-radius: 8px; padding: 15px; margin-top: 10px; }
.summary-row { display: flex; justify-content: space-between; padding: 6px 0; color: #aaa; font-size: 14px; }
.summary-row.total { color: #a855f7; font-size: 18px; font-weight: 700; border-top: 1px solid #2a2a3e; margin-top: 8px; padding-top: 12px; }

/* Invoice Preview */
#invoice-preview { display: none; background: #fff; color: #000; border-radius: 12px; overflow: hidden; margin-top: 20px; box-shadow: 0 10px 40px #0005; }
.inv-top { padding: 30px 35px; }
.inv-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
.inv-logo { max-width: 100px; max-height: 50px; }
.inv-company-name { font-size: 22px; font-weight: 900; }
.inv-title-box { text-align: left; }
.inv-title-box h2 { font-size: 28px; font-weight: 900; }
.inv-title-box p { color: #666; font-size: 13px; }
.inv-divider { height: 4px; margin-bottom: 25px; border-radius: 2px; }
.inv-parties { display: flex; justify-content: space-between; margin-bottom: 25px; }
.inv-party h4 { font-size: 12px; text-transform: uppercase; color: #999; margin-bottom: 6px; }
.inv-party p { font-size: 14px; color: #333; margin-bottom: 3px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
th { padding: 12px 15px; text-align: right; font-size: 13px; color: #fff; }
td { padding: 12px 15px; text-align: right; font-size: 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
tr:last-child td { border-bottom: none; }
.inv-footer { padding: 20px 35px; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
.inv-notes { color: #666; font-size: 13px; max-width: 60%; }
.inv-total-box { text-align: left; }
.inv-total-box .label { font-size: 12px; color: #999; }
.inv-total-box .amount { font-size: 24px; font-weight: 900; }

/* Print */
.btn-print { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; width: calc(100% - 40px); margin: 20px; padding: 15px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 700; }

@media print {
  body * { visibility: hidden; }
  #invoice-preview, #invoice-preview * { visibility: visible; }
  #invoice-preview { position: fixed; top: 0; left: 0; width: 100%; }
  .btn-print { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🧾 مولد الفواتير العربي</h1>
  <p>أنشئ فواتير احترافية في ثوانٍ</p>
  <span class="badge">✨ Pro Max</span>
</div>

<div class="container">

  <!-- Tab 1: بيانات -->
  <div class="card">
    <div class="card-title">🎨 لون الفاتورة</div>
    <div class="color-options">
      <div class="color-opt selected" style="background:#a855f7" data-color="#a855f7" onclick="selectColor(this)"></div>
      <div class="color-opt" style="background:#3b82f6" data-color="#3b82f6" onclick="selectColor(this)"></div>
      <div class="color-opt" style="background:#10b981" data-color="#10b981" onclick="selectColor(this)"></div>
      <div class="color-opt" style="background:#ef4444" data-color="#ef4444" onclick="selectColor(this)"></div>
      <div class="color-opt" style="background:#f59e0b" data-color="#f59e0b" onclick="selectColor(this)"></div>
      <div class="color-opt" style="background:#000000" data-color="#000000" onclick="selectColor(this)"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏢 بيانات الشركة</div>
    <div class="logo-upload" onclick="document.getElementById('logo-input').click()">
      <div>📷 اضغط لرفع لوجو الشركة (اختياري)</div>
      <input type="file" id="logo-input" accept="image/*" onchange="previewLogo(this)">
      <img id="logo-preview" alt="لوجو">
    </div>
    <div class="row">
      <div><label>اسم الشركة</label><input id="company-name" placeholder="Tiger-X Studio" oninput="saveData()"></div>
      <div><label>رقم الهاتف</label><input id="company-phone" placeholder="01xxxxxxxxx" oninput="saveData()"></div>
    </div>
    <label>العنوان</label>
    <input id="company-address" placeholder="المنصورة، مصر" oninput="saveData()">
    <label>البريد الإلكتروني</label>
    <input id="company-email" placeholder="info@tiger-x.com" oninput="saveData()">
  </div>

  <div class="card">
    <div class="card-title">👤 بيانات العميل</div>
    <div class="row">
      <div><label>اسم العميل</label><input id="client-name" placeholder="اسم العميل"></div>
      <div><label>رقم الهاتف</label><input id="client-phone" placeholder="01xxxxxxxxx"></div>
    </div>
    <div class="row">
      <div><label>رقم الفاتورة</label><input id="inv-number" placeholder="001"></div>
      <div><label>التاريخ</label><input id="inv-date" type="date"></div>
    </div>
    <div class="row">
      <div>
        <label>العملة</label>
        <select id="currency">
          <option value="ج.م">جنيه مصري (ج.م)</option>
          <option value="$">دولار ($)</option>
          <option value="€">يورو (€)</option>
          <option value="ر.س">ريال سعودي (ر.س)</option>
          <option value="د.إ">درهم إماراتي (د.إ)</option>
        </select>
      </div>
      <div>
        <label>نسبة الضريبة (VAT)</label>
        <select id="vat-rate">
          <option value="0">بدون ضريبة</option>
          <option value="14">14% - ضريبة مصر</option>
          <option value="15">15%</option>
          <option value="5">5%</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📦 المنتجات / الخدمات</div>
    <div id="items-container">
      <div class="item-row">
        <input placeholder="اسم المنتج أو الخدمة" class="item-name" style="flex:3" oninput="updateSummary()">
        <input placeholder="كمية" class="item-qty" type="number" min="1" value="1" style="flex:1" oninput="updateSummary()">
        <input placeholder="السعر" class="item-price" type="number" style="flex:1" oninput="updateSummary()">
        <button class="btn-remove" onclick="removeItem(this)">✕</button>
      </div>
    </div>
    <button class="btn btn-add" onclick="addItem()">+ إضافة منتج أو خدمة</button>

    <div class="summary-box">
      <div class="summary-row"><span>المجموع الجزئي</span><span id="sub-total">0 ج.م</span></div>
      <div class="summary-row" id="vat-row" style="display:none"><span>الضريبة</span><span id="vat-amount">0 ج.م</span></div>
      <div class="summary-row total"><span>الإجمالي الكلي</span><span id="grand-total">0 ج.م</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 ملاحظات</div>
    <textarea id="notes" rows="3" placeholder="شكراً لتعاملكم معنا - نتطلع لخدمتكم مجدداً"></textarea>
    <button class="btn btn-generate" onclick="generateInvoice()">🧾 إنشاء الفاتورة الآن</button>
  </div>

  <!-- Invoice Preview -->
  <div id="invoice-preview">
    <div class="inv-top">
      <div class="inv-header-row">
        <div>
          <img id="prev-logo" class="inv-logo" style="display:none">
          <div id="prev-company" class="inv-company-name"></div>
          <div id="prev-address" style="color:#666;font-size:13px;margin-top:4px"></div>
          <div id="prev-company-phone" style="color:#666;font-size:13px"></div>
          <div id="prev-company-email" style="color:#666;font-size:13px"></div>
        </div>
        <div class="inv-title-box">
          <h2 id="prev-inv-title" style="color:#a855f7">فاتورة</h2>
          <p id="prev-inv-number" style="color:#666"></p>
          <p id="prev-date" style="color:#666"></p>
        </div>
      </div>

      <div class="inv-divider" id="prev-divider"></div>

      <div class="inv-parties">
        <div class="inv-party">
          <h4>مُصدر من</h4>
          <p id="prev-from-company" style="font-weight:700"></p>
          <p id="prev-from-phone"></p>
        </div>
        <div class="inv-party" style="text-align:left">
          <h4>إلى العميل</h4>
          <p id="prev-client" style="font-weight:700"></p>
          <p id="prev-client-phone"></p>
        </div>
      </div>

      <table>
        <thead>
          <tr id="prev-thead"></tr>
        </thead>
        <tbody id="prev-items"></tbody>
      </table>
    </div>

    <div class="inv-footer">
      <div class="inv-notes" id="prev-notes"></div>
      <div class="inv-total-box">
        <div class="label">الإجمالي الكلي</div>
        <div class="amount" id="prev-total"></div>
        <div id="prev-vat-line" style="font-size:12px;color:#999"></div>
      </div>
    </div>

    <button class="btn-print" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
  </div>

</div>

<script>
let selectedColor = '#a855f7';
let logoData = null;

// Load saved data
window.onload = () => {
  document.getElementById('inv-date').valueAsDate = new Date();
  const saved = JSON.parse(localStorage.getItem('tiger-invoice') || '{}');
  if(saved.companyName) document.getElementById('company-name').value = saved.companyName;
  if(saved.companyPhone) document.getElementById('company-phone').value = saved.companyPhone;
  if(saved.companyAddress) document.getElementById('company-address').value = saved.companyAddress;
  if(saved.companyEmail) document.getElementById('company-email').value = saved.companyEmail;
};

function saveData() {
  localStorage.setItem('tiger-invoice', JSON.stringify({
    companyName: document.getElementById('company-name').value,
    companyPhone: document.getElementById('company-phone').value,
    companyAddress: document.getElementById('company-address').value,
    companyEmail: document.getElementById('company-email').value,
  }));
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

function previewLogo(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    logoData = e.target.result;
    const img = document.getElementById('logo-preview');
    img.src = logoData;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function addItem() {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `
    <input placeholder="اسم المنتج أو الخدمة" class="item-name" style="flex:3" oninput="updateSummary()">
    <input placeholder="كمية" class="item-qty" type="number" min="1" value="1" style="flex:1" oninput="updateSummary()">
    <input placeholder="السعر" class="item-price" type="number" style="flex:1" oninput="updateSummary()">
    <button class="btn-remove" onclick="removeItem(this)">✕</button>
  `;
  document.getElementById('items-container').appendChild(div);
}

function removeItem(btn) {
  if(document.querySelectorAll('.item-row').length > 1) btn.parentElement.remove();
  updateSummary();
}

function getCurrency() { return document.getElementById('currency').value; }
function getVat() { return parseFloat(document.getElementById('vat-rate').value) || 0; }

function updateSummary() {
  let sub = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
    const price = parseFloat(row.querySelector('.item-price').value) || 0;
    sub += qty * price;
  });
  const vat = getVat();
  const vatAmt = sub * vat / 100;
  const total = sub + vatAmt;
  const cur = getCurrency();
  document.getElementById('sub-total').textContent = sub.toLocaleString() + ' ' + cur;
  document.getElementById('grand-total').textContent = total.toLocaleString() + ' ' + cur;
  if(vat > 0) {
    document.getElementById('vat-row').style.display = 'flex';
    document.getElementById('vat-amount').textContent = vatAmt.toLocaleString() + ' ' + cur;
  } else {
    document.getElementById('vat-row').style.display = 'none';
  }
}

document.getElementById('currency').addEventListener('change', updateSummary);
document.getElementById('vat-rate').addEventListener('change', updateSummary);

function generateInvoice() {
  const cur = getCurrency();
  const vat = getVat();
  let sub = 0;
  let rows = '';

  document.querySelectorAll('.item-row').forEach(row => {
    const name = row.querySelector('.item-name').value || '-';
    const qty = parseFloat(row.querySelector('.item-qty').value) || 1;
    const price = parseFloat(row.querySelector('.item-price').value) || 0;
    const total = qty * price;
    sub += total;
    rows += `<tr><td>${name}</td><td>${qty}</td><td>${price.toLocaleString()} ${cur}</td><td style="font-weight:700">${total.toLocaleString()} ${cur}</td></tr>`;
  });

  const vatAmt = sub * vat / 100;
  const grand = sub + vatAmt;

  // Set color
  document.getElementById('prev-inv-title').style.color = selectedColor;
  document.getElementById('prev-divider').style.background = selectedColor;
  document.getElementById('prev-thead').innerHTML = `<th style="background:${selectedColor}">المنتج/الخدمة</th><th style="background:${selectedColor}">الكمية</th><th style="background:${selectedColor}">السعر</th><th style="background:${selectedColor}">الإجمالي</th>`;

  // Logo
  if(logoData) {
    document.getElementById('prev-logo').src = logoData;
    document.getElementById('prev-logo').style.display = 'block';
  }

  // Data
  document.getElementById('prev-company').textContent = document.getElementById('company-name').value || 'Tiger-X Studio';
  document.getElementById('prev-address').textContent = document.getElementById('company-address').value;
  document.getElementById('prev-company-phone').textContent = document.getElementById('company-phone').value;
  document.getElementById('prev-company-email').textContent = document.getElementById('company-email').value;
  document.getElementById('prev-from-company').textContent = document.getElementById('company-name').value || 'Tiger-X Studio';
  document.getElementById('prev-from-phone').textContent = document.getElementById('company-phone').value;
  document.getElementById('prev-inv-number').textContent = 'رقم: ' + (document.getElementById('inv-number').value || '001');
  document.getElementById('prev-date').textContent = 'التاريخ: ' + document.getElementById('inv-date').value;
  document.getElementById('prev-client').textContent = document.getElementById('client-name').value;
  document.getElementById('prev-client-phone').textContent = document.getElementById('client-phone').value;
  document.getElementById('prev-items').innerHTML = rows;
  document.getElementById('prev-total').textContent = grand.toLocaleString() + ' ' + cur;
  document.getElementById('prev-total').style.color = selectedColor;
  document.getElementById('prev-vat-line').textContent = vat > 0 ? `شامل ضريبة ${vat}%` : '';
  document.getElementById('prev-notes').textContent = document.getElementById('notes').value;

  const preview = document.getElementById('invoice-preview');
  preview.style.display = 'block';
  preview.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
     </html>
